pipeline:
  selection_threshold:
    T1: 60
    T1.5: 65
    T2: 70  # 从75降至70，覆盖更多工具类内容
  
  tier_weight:
    T1: 1.3
    T1.5: 1.15
    T2: 1.0

scheduler:
  max_concurrent_tasks: 5
  request_interval: 1 # 秒，请求间隔防止被封

storage:
  db_path: "data/hot_pulse.db"

